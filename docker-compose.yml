services:
  db:
    image: postgres:16-alpine
    container_name: vox_social_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vox_social
    ports:
      - "5432:5432"
    volumes:
      # Automatically run the schema initialization script on startup
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vox_social"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vox_social_backend
    env_file:
      - .env
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://postgres:password@db:5432/vox_social?sslmode=disable
      - ALLOWED_ORIGINS=*
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
